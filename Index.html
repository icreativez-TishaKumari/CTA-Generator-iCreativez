<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Generator | Tisha Kumari</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 5px; }
        .footer-text { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .preview-box { height: 100px; display: flex; align-items: center; justify-content: center; border: 2px dashed #e2e8f0; margin: 20px 0; border-radius: 10px; }
        #cta-btn { text-decoration: none; border: none; cursor: pointer; transition: 0.3s; padding: 12px 24px; border-radius: 8px; font-weight: bold; }
        .code-output { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h2>CTA Generator</h2>
    <p class="footer-text">Developed by Tisha Kumari | iCreativez Task 1</p>
    <label>Button Text</label>
    <input type="text" id="btnText" value="Try DeepSeek Now" oninput="updateCTA()">
    <label>Background Color</label>
    <input type="color" id="bgColor" value="#6366f1" oninput="updateCTA()">
    <div class="preview-box">
        <button id="cta-btn">Try DeepSeek Now</button>
    </div>
    <label>CSS Output</label>
    <div class="code-output"><code id="cssCode">/* Style info */</code></div>
</div>
<script>
    function updateCTA() {
        const btn = document.getElementById('cta-btn');
        const text = document.getElementById('btnText').value;
        const bg = document.getElementById('bgColor').value;
        btn.innerText = text;
        btn.style.backgroundColor = bg;
        document.getElementById('cssCode').innerText = `background: ${bg};\ncolor: white;\nborder-radius: 8px;`;
    }
    updateCTA();
</script>
</body>
</html>
